name: Deploy To GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SHEETS_API_KEY: ${{ secrets.VITE_SHEETS_API_KEY }}
          VITE_SHEETS_SPREADSHEET_ID: ${{ secrets.VITE_SHEETS_SPREADSHEET_ID }}
          VITE_SHEETS_RANGE: ${{ secrets.VITE_SHEETS_RANGE }}
          VITE_SHEETS_CPE_SPREADSHEET_ID: ${{ secrets.VITE_SHEETS_CPE_SPREADSHEET_ID }}
          VITE_SHEETS_CPE_RANGE: ${{ secrets.VITE_SHEETS_CPE_RANGE }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
